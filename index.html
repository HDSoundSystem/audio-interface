<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Audio Player Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f1012;
            --panel-color: #1a1c20;
            --accent: #00d4ff;
            --pioneer-orange: #ff9d00;
            --text-main: #e0e0e0;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .player-container {
            background: var(--panel-color);
            width: 420px;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid #2a2d32;
        }

        /* --- DISPLAY SECTION --- */
        .display-section {
            background: #000;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid #333;
            text-align: center;
        }

        .track-info h1 {
            font-size: 1.2rem;
            margin: 0;
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-info p {
            color: #777;
            font-size: 0.9rem;
            margin: 5px 0 15px;
        }

        .time-rail {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            font-family: 'Courier New', monospace;
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* --- MIXER SECTION (Vertical Sliders) --- */
        .mixer-section {
            display: flex;
            justify-content: space-around;
            padding: 20px 0;
            background: var(--glass);
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .control-group label {
            font-size: 0.7rem;
            font-weight: bold;
            color: #555;
        }

        input[orient="vertical"] {
            appearance: slider-vertical;
            width: 12px;
            height: 120px;
        }

        /* --- CONTROLS MAIN --- */
        .controls-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .btn-transport {
            background: none;
            border: none;
            color: #666;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-transport:hover { color: white; }

        .btn-play {
            width: 70px;
            height: 70px;
            background: var(--accent);
            color: #000;
            border-radius: 50%;
            font-size: 1.6rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-play:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        .active-play {
            background: #fff;
            color: var(--accent);
        }

        /* --- EXTRA FUNCTIONS (Eject, Playlist, etc) --- */
        .extra-functions {
            display: flex;
            justify-content: space-between;
            padding-top: 20px;
            border-top: 1px solid #2a2d32;
        }

        .btn-tool {
            background: none;
            border: none;
            color: #555;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-tool:hover {
            color: var(--accent);
        }

        #eject-btn:hover {
            color: var(--pioneer-orange);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="player-container">
    <header class="display-section">
        <div class="track-info">
            <h1 id="title">Aucun fichier</h1>
            <p id="artist">Appuyez sur Eject pour charger</p>
        </div>
        <div class="time-rail">
            <span id="current-time">00:00</span>
            <input type="range" id="seek-slider" value="0" min="0" max="100">
            <span id="duration">00:00</span>
        </div>
    </header>

    <div class="mixer-section">
        <div class="control-group">
            <label>VOLUME</label>
            <input type="range" id="volume-slider" orient="vertical" min="0" max="1" step="0.01" value="0.7">
            <i class="fa-solid fa-volume-high" style="font-size: 0.8rem; color: #444;"></i>
        </div>
        
        <div class="control-group">
            <label>PITCH</label>
            <input type="range" id="pitch-slider" orient="vertical" min="0.5" max="1.5" step="0.01" value="1">
            <span id="pitch-value" style="font-size: 0.7rem; color: var(--accent);">1.0x</span>
        </div>
    </div>

    <footer class="controls-main">
        <button class="btn-transport"><i class="fa-solid fa-shuffle"></i></button>
        <button class="btn-transport"><i class="fa-solid fa-backward-step"></i></button>
        
        <button id="play-pause" class="btn-play">
            <i class="fa-solid fa-play" id="play-icon"></i>
        </button>
        
        <button class="btn-transport"><i class="fa-solid fa-forward-step"></i></button>
        <button class="btn-transport"><i class="fa-solid fa-repeat"></i></button>
    </footer>

    <nav class="extra-functions">
        <input type="file" id="file-upload" style="display:none" accept="audio/*">
        
        <button id="eject-btn" class="btn-tool" title="Ajouter des fichiers">
            <i class="fa-solid fa-eject"></i>
        </button>

        <button class="btn-tool" title="Playlist"><i class="fa-solid fa-list-ul"></i></button>
        <button class="btn-tool" title="Égaliseur"><i class="fa-solid fa-sliders"></i></button>
        <button class="btn-tool" title="Paramètres"><i class="fa-solid fa-gear"></i></button>
    </nav>
</div>

<script>
    const audio = new Audio();
    const playBtn = document.getElementById('play-pause');
    const playIcon = document.getElementById('play-icon');
    const ejectBtn = document.getElementById('eject-btn');
    const fileUpload = document.getElementById('file-upload');
    const titleDisplay = document.getElementById('title');
    const artistDisplay = document.getElementById('artist');
    const volumeSlider = document.getElementById('volume-slider');
    const pitchSlider = document.getElementById('pitch-slider');
    const pitchValue = document.getElementById('pitch-value');
    const seekSlider = document.getElementById('seek-slider');
    const currentTimeText = document.getElementById('current-time');
    const durationText = document.getElementById('duration');

    // 1. Gestion du chargement de fichier
    ejectBtn.addEventListener('click', () => fileUpload.click());

    fileUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            audio.src = url;
            titleDisplay.innerText = file.name.replace(/\.[^/.]+$/, "");
            artistDisplay.innerText = "Fichier Local";
            playBtn.classList.remove('active-play');
            playIcon.className = "fa-solid fa-play";
        }
    });

    // 2. Play / Pause
    playBtn.addEventListener('click', () => {
        if (!audio.src) return alert("Veuillez charger un fichier d'abord");
        
        if (audio.paused) {
            audio.play();
            playIcon.className = "fa-solid fa-pause";
            playBtn.classList.add('active-play');
        } else {
            audio.pause();
            playIcon.className = "fa-solid fa-play";
            playBtn.classList.remove('active-play');
        }
    });

    // 3. Volume
    volumeSlider.addEventListener('input', (e) => {
        audio.volume = e.target.value;
    });

    // 4. Pitch (Playback Rate)
    pitchSlider.addEventListener('input', (e) => {
        const val = e.target.value;
        audio.playbackRate = val;
        pitchValue.innerText = parseFloat(val).toFixed(2) + "x";
    });

    // 5. Mise à jour de la barre de progression
    audio.addEventListener('timeupdate', () => {
        const progress = (audio.currentTime / audio.duration) * 100;
        seekSlider.value = progress || 0;
        
        // Formatage temps
        const curMins = Math.floor(audio.currentTime / 60);
        const curSecs = Math.floor(audio.currentTime % 60);
        currentTimeText.innerText = `${curMins}:${curSecs < 10 ? '0'+curSecs : curSecs}`;
        
        if(audio.duration) {
            const durMins = Math.floor(audio.duration / 60);
            const durSecs = Math.floor(audio.duration % 60);
            durationText.innerText = `${durMins}:${durSecs < 10 ? '0'+durSecs : durSecs}`;
        }
    });

    // 6. Navigation dans le morceau
    seekSlider.addEventListener('input', (e) => {
        const seekTo = audio.duration * (e.target.value / 100);
        audio.currentTime = seekTo;
    });
</script>

</body>
</html>
