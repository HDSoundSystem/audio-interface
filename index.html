<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Audio Mixer & Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f1012;
            --panel-color: #1a1c20;
            --accent: #00d4ff;
            --pioneer-orange: #ff9d00;
            --text-main: #e0e0e0;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .player-container {
            background: var(--panel-color);
            width: 520px;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.7);
            border: 1px solid #2a2d32;
        }

        .display-section {
            background: #000;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .track-info {
            width: 100%;
            margin-bottom: 15px;
        }

        .track-info h1 { font-size: 1.2rem; margin: 0; color: var(--accent); text-align: center; }
        .track-info p { color: #777; font-size: 0.9rem; margin: 5px 0; text-align: center;}

        /* --- BARRE DE TEMPS PLEINE LARGEUR --- */
        .time-rail { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            font-size: 0.75rem; 
            font-family: monospace; 
            width: 100%; /* Prend toute la largeur de display-section */
        }

        #seek-slider {
            flex-grow: 1; /* Force le slider à pousser les timers sur les bords */
            margin: 0;
            height: 5px;
        }

        /* --- MIXER SECTION --- */
        .mixer-section {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: var(--glass);
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .control-group label {
            font-size: 0.65rem;
            font-weight: bold;
            color: #888;
            letter-spacing: 1px;
        }

        input[orient="vertical"] {
            appearance: slider-vertical;
            width: 10px;
            height: 130px;
            cursor: ns-resize;
        }

        .val-label { font-size: 0.7rem; color: var(--accent); min-height: 1em; }

        /* --- CONTROLS --- */
        .controls-main { display: flex; justify-content: space-around; align-items: center; margin-bottom: 25px; }
        
        .btn-play {
            width: 70px; height: 70px; background: var(--accent); color: #000;
            border-radius: 50%; font-size: 1.6rem; border: none; cursor: pointer; transition: 0.2s;
        }

        .btn-play:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--accent); }
        .active-play { background: #fff; color: var(--accent); }

        .extra-functions { display: flex; justify-content: space-between; padding-top: 20px; border-top: 1px solid #2a2d32; }
        .btn-tool { background: none; border: none; color: #555; font-size: 1.1rem; cursor: pointer; }
        .btn-tool:hover { color: var(--accent); }
    </style>
</head>
<body>

<div class="player-container">
    <header class="display-section">
        <div class="track-info">
            <h1 id="title">Prêt à mixer</h1>
            <p id="artist">Chargez un morceau via Eject</p>
        </div>
        <div class="time-rail">
            <span id="current-time">00:00</span>
            <input type="range" id="seek-slider" value="0" min="0" max="100">
            <span id="duration">00:00</span>
        </div>
    </header>

    <div class="mixer-section">
        <div class="control-group">
            <label>VOL</label>
            <input type="range" id="volume-slider" orient="vertical" min="0" max="1" step="0.01" value="0.7">
            <span class="val-label"><i class="fa-solid fa-volume-high"></i></span>
        </div>
        
        <div class="control-group">
            <label>LOW</label>
            <input type="range" id="bass-slider" orient="vertical" min="-20" max="20" step="1" value="0">
            <span id="bass-val" class="val-label">0dB</span>
        </div>

        <div class="control-group">
            <label>HI</label>
            <input type="range" id="treble-slider" orient="vertical" min="-20" max="20" step="1" value="0">
            <span id="treble-val" class="val-label">0dB</span>
        </div>

        <div class="control-group">
            <label>PITCH</label>
            <input type="range" id="pitch-slider" orient="vertical" min="0.5" max="1.5" step="0.01" value="1">
            <span id="pitch-val" class="val-label">1.0x</span>
        </div>
    </div>

    <footer class="controls-main">
        <button class="btn-tool"><i class="fa-solid fa-backward-step"></i></button>
        <button id="play-pause" class="btn-play"><i class="fa-solid fa-play" id="play-icon"></i></button>
        <button class="btn-tool"><i class="fa-solid fa-forward-step"></i></button>
    </footer>

    <nav class="extra-functions">
        <input type="file" id="file-upload" style="display:none" accept="audio/*">
        <button id="eject-btn" class="btn-tool" title="Eject/Load"><i class="fa-solid fa-eject"></i></button>
        <button class="btn-tool"><i class="fa-solid fa-list-ul"></i></button>
        <button class="btn-tool"><i class="fa-solid fa-sliders"></i></button>
        <button class="btn-tool"><i class="fa-solid fa-gear"></i></button>
    </nav>
</div>

<script>
    const audio = new Audio();
    let audioContext, source, bassFilter, trebleFilter;

    const playBtn = document.getElementById('play-pause');
    const playIcon = document.getElementById('play-icon');
    const fileUpload = document.getElementById('file-upload');
    const titleDisplay = document.getElementById('title');
    
    function initAudioEngine() {
        if (audioContext) return;
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        source = audioContext.createMediaElementSource(audio);
        bassFilter = audioContext.createBiquadFilter();
        bassFilter.type = "lowshelf";
        bassFilter.frequency.value = 200;
        trebleFilter = audioContext.createBiquadFilter();
        trebleFilter.type = "highshelf";
        trebleFilter.frequency.value = 3000;
        source.connect(bassFilter);
        bassFilter.connect(trebleFilter);
        trebleFilter.connect(audioContext.destination);
    }

    document.getElementById('eject-btn').addEventListener('click', () => fileUpload.click());
    fileUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            audio.src = URL.createObjectURL(file);
            titleDisplay.innerText = file.name.replace(/\.[^/.]+$/, "");
        }
    });

    playBtn.addEventListener('click', () => {
        initAudioEngine();
        if (!audio.src) return;
        if (audio.paused) {
            audio.play();
            playIcon.className = "fa-solid fa-pause";
            playBtn.classList.add('active-play');
        } else {
            audio.pause();
            playIcon.className = "fa-solid fa-play";
            playBtn.classList.remove('active-play');
        }
    });

    document.getElementById('volume-slider').addEventListener('input', (e) => audio.volume = e.target.value);
    document.getElementById('bass-slider').addEventListener('input', (e) => {
        if (bassFilter) bassFilter.gain.value = e.target.value;
        document.getElementById('bass-val').innerText = e.target.value + "dB";
    });
    document.getElementById('treble-slider').addEventListener('input', (e) => {
        if (trebleFilter) trebleFilter.gain.value = e.target.value;
        document.getElementById('treble-val').innerText = e.target.value + "dB";
    });
    document.getElementById('pitch-slider').addEventListener('input', (e) => {
        audio.playbackRate = e.target.value;
        document.getElementById('pitch-val').innerText = parseFloat(e.target.value).toFixed(2) + "x";
    });

    audio.addEventListener('timeupdate', () => {
        document.getElementById('seek-slider').value = (audio.currentTime / audio.duration) * 100 || 0;
        const curMins = Math.floor(audio.currentTime / 60);
        const curSecs = Math.floor(audio.currentTime % 60);
        document.getElementById('current-time').innerText = `${curMins}:${curSecs < 10 ? '0'+curSecs : curSecs}`;
        
        if(audio.duration) {
            const durMins = Math.floor(audio.duration / 60);
            const durSecs = Math.floor(audio.duration % 60);
            document.getElementById('duration').innerText = `${durMins}:${durSecs < 10 ? '0'+durSecs : durSecs}`;
        }
    });

    document.getElementById('seek-slider').addEventListener('input', (e) => {
        audio.currentTime = audio.duration * (e.target.value / 100);
    });
</script>

</body>
</html>
