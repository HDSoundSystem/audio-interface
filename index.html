<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Audio Mixer PWA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1c20">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player-container">
    <header class="display-section">
        <div class="album-art-container">
            <span id="no-cover-text">NO COVER</span>
            <img id="album-art" src="" alt="Album Art" style="display: none;">
        </div>

        <div class="track-info">
            <div id="display-meta">CHARGEZ VOS FICHIERS</div>
        </div>
        
        <div class="time-rail">
            <span id="current-time" class="time-box">00:00</span>
            <input type="range" id="seek-slider" value="0" min="0" max="100">
            <span id="duration" class="time-box">00:00</span>
        </div>
    </header>

    <div class="playlist-container">
        <ul id="playlist-ul"></ul>
    </div>

    <div class="mixer-section">
        <div class="control-group">
            <label>VOL</label>
            <input type="range" id="volume-slider" class="vertical-slider" min="0" max="1" step="0.01" value="0.05">
            <button class="btn-rst" id="mute-btn">MUTE</button>
        </div>
        
        <div class="control-group">
            <label>LOW</label>
            <input type="range" id="bass-slider" class="vertical-slider" min="-20" max="20" step="1" value="0">
            <button class="btn-rst" data-target="bass-slider">RST</button>
        </div>

        <div class="control-group">
            <label>HI</label>
            <input type="range" id="treble-slider" class="vertical-slider" min="-20" max="20" step="1" value="0">
            <button class="btn-rst" data-target="treble-slider">RST</button>
        </div>

        <div class="control-group">
            <label>EQ/FX</label>
            <button id="loudness-btn" class="btn-toggle">LOUD</button>
            <button id="bypass-btn" class="btn-toggle">BYPASS</button>
        </div>

        <div class="control-group">
            <label>PITCH</label>
            <input type="range" id="pitch-slider" class="vertical-slider" min="0.5" max="1.5" step="0.01" value="1">
            <button class="btn-rst" data-target="pitch-slider">RST</button>
        </div>
    </div>

    <footer class="controls-main">
        <div class="control-subgroup">
            <button id="time-toggle-btn" class="btn-tool secondary"><i class="fa-regular fa-clock"></i></button>
            <button id="shuffle-btn" class="btn-tool secondary"><i class="fa-solid fa-shuffle"></i></button>
        </div>

        <div class="control-subgroup main-nav">
            <button id="rewind-btn" class="btn-tool secondary"><i class="fa-solid fa-backward-fast"></i></button>
            <button id="prev-btn" class="btn-tool secondary"><i class="fa-solid fa-backward-step"></i></button>
            <button id="play-pause" class="btn-play"><i class="fa-solid fa-play" id="play-icon"></i></button>
            <button id="next-btn" class="btn-tool secondary"><i class="fa-solid fa-forward-step"></i></button>
            <button id="forward-btn" class="btn-tool secondary"><i class="fa-solid fa-forward-fast"></i></button>
        </div>

        <div class="control-subgroup">
            <button id="repeat-btn" class="btn-tool secondary"><i class="fa-solid fa-repeat"></i></button>
            <button id="ab-loop-btn" class="btn-tool secondary">A-B</button>
        </div>
    </footer>

    <nav class="extra-functions">
        <input type="file" id="file-upload" style="display:none" accept="audio/*" multiple>
        <button id="eject-btn" class="btn-tool"><i class="fa-solid fa-eject"></i></button>
        <button class="btn-tool"><i class="fa-solid fa-sliders"></i></button>
        <button class="btn-tool"><i class="fa-solid fa-gear"></i></button>
    </nav>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
<script src="script.js"></script>
</body>
</html>
