<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Audio Player & Mixer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player-container">
    <header class="display-section">
        <div class="album-art-container" id="art-container">
            <span id="no-cover-text">NO COVER</span>
            <img id="album-art" src="" alt="Album Art" style="display: none;">
        </div>

        <div class="track-info">
            <h1 id="title">Prêt à mixer</h1>
            <p id="artist">Chargez un morceau via Eject</p>
        </div>
        
        <div class="time-rail">
            <span id="current-time">00:00</span>
            <input type="range" id="seek-slider" value="0" min="0" max="100">
            <span id="duration">00:00</span>
        </div>
    </header>

    <div class="mixer-section">
        <div class="control-group">
            <label>VOL</label>
            <input type="range" id="volume-slider" orient="vertical" min="0" max="1" step="0.01" value="0.05">
            <span class="val-label"><i class="fa-solid fa-volume-high"></i></span>
        </div>
        
        <div class="control-group">
            <label>LOW</label>
            <input type="range" id="bass-slider" orient="vertical" min="-20" max="20" step="1" value="0">
            <span id="bass-val" class="val-label">0dB</span>
        </div>

        <div class="control-group">
            <label>HI</label>
            <input type="range" id="treble-slider" orient="vertical" min="-20" max="20" step="1" value="0">
            <span id="treble-val" class="val-label">0dB</span>
        </div>

        <div class="control-group">
            <label>PITCH</label>
            <input type="range" id="pitch-slider" orient="vertical" min="0.5" max="1.5" step="0.01" value="1">
            <span id="pitch-val" class="val-label">1.0x</span>
        </div>
    </div>

    <footer class="controls-main">
        <button class="btn-tool secondary"><i class="fa-solid fa-shuffle"></i></button>
        <button class="btn-tool secondary"><i class="fa-solid fa-backward-step"></i></button>
        <button id="play-pause" class="btn-play">
            <i class="fa-solid fa-play" id="play-icon"></i>
        </button>
        <button class="btn-tool secondary"><i class="fa-solid fa-forward-step"></i></button>
        <button class="btn-tool secondary"><i class="fa-solid fa-repeat"></i></button>
    </footer>

    <nav class="extra-functions">
        <input type="file" id="file-upload" style="display:none" accept="audio/*">
        <button id="eject-btn" class="btn-tool" title="Eject/Load">
            <i class="fa-solid fa-eject"></i>
        </button>
        <button class="btn-tool"><i class="fa-solid fa-list-ul"></i></button>
        <button class="btn-tool"><i class="fa-solid fa-sliders"></i></button>
        <button class="btn-tool"><i class="fa-solid fa-gear"></i></button>
    </nav>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
<script src="script.js"></script>
</body>
</html>
